name: panchangam
description: "Telugu Panchangam — A modern calendar app with traditional Panchangam"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Local storage (offline settings)
  hive_flutter: ^1.1.0

  # Font
  google_fonts: ^6.2.1

  # Date/number formatting
  intl: ^0.19.0

  # Reminders/alarms (scaffold — full implementation in Session 4)
  flutter_local_notifications: ^18.0.1

  # Unique IDs for user events (cloud-sync-ready, RFC 4122)
  uuid: ^4.5.1
  timezone: ^0.10.1
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  google_sign_in: ^7.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0B1437"
  adaptive_icon_foreground: "assets/icon_fg.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png
    - assets/icon_fg.png
    - assets/data/cities_india.json
    - assets/data/festivals.json
